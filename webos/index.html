<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NimbusOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- BOOT / LOCK SCREEN -->
  <div id="boot-screen">
    <div class="boot-clouds">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>
    <div id="boot-content">
      <div class="boot-logo">
        <div class="aurora-ring"></div>
        <svg width="44" height="44" viewBox="0 0 56 56" fill="none">
          <path d="M16 32c0-5 4-8 8-7 1-4 5-7 9-6 4 1 7 5 6 9 3 1 5 4 4 7-1 3-4 4-7 4H19c-3 0-6-2-6-5 0-2 1-3 3-2z" fill="url(#g)"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#5EEAD4"/><stop offset="1" stop-color="#A78BFA"/></linearGradient></defs>
        </svg>
      </div>
      <div class="boot-title">nimbus<span>os</span></div>
      <div class="boot-time" id="boot-time">--:--</div>
      <div class="boot-date" id="boot-date">--</div>
      <button id="boot-enter">Enter →</button>
    </div>
  </div>

  <!-- DESKTOP -->
  <div id="desktop">
    <div class="desktop-clouds">
      <div class="cloud dc1"></div>
      <div class="cloud dc2"></div>
      <div class="cloud dc3"></div>
      <div class="cloud dc4"></div>
    </div>

    <div id="desktop-icons"></div>
    <div id="windows-layer"></div>

    <!-- LAUNCHER BACKDROP -->
    <div id="launcher-backdrop"></div>

    <!-- START MENU / LAUNCHER -->
    <div id="start-menu">
      <div class="start-search">
        <input id="start-search-input" type="text" placeholder="Search apps..." autocomplete="off">
      </div>
      <div class="start-apps" id="start-apps"></div>
      <div class="start-footer">
        <div class="start-user">
          <div class="start-user-avatar">N</div>
          <span>Nimbus User</span>
        </div>
        <button id="start-power" title="Restart NimbusOS">⏻</button>
      </div>
    </div>

    <!-- TASKBAR -->
    <div id="taskbar">
      <button id="start-btn" title="Start">
        <svg width="20" height="20" viewBox="0 0 56 56" fill="none">
          <path d="M16 32c0-5 4-8 8-7 1-4 5-7 9-6 4 1 7 5 6 9 3 1 5 4 4 7-1 3-4 4-7 4H19c-3 0-6-2-6-5 0-2 1-3 3-2z" fill="url(#tg)"/>
          <defs><linearGradient id="tg" x1="0" y1="0" x2="56" y2="56"><stop stop-color="#5EEAD4"/><stop offset="1" stop-color="#A78BFA"/></linearGradient></defs>
        </svg>
      </button>
      <div id="taskbar-search">
        <span class="ts-icon">⌕</span>
        <input type="text" placeholder="Type here to search" id="taskbar-search-input">
      </div>
      <div id="taskbar-apps"></div>
      <div id="tray">
        <div id="tray-clock">
          <div id="tray-time">--:--</div>
          <div id="tray-date">--/--/----</div>
        </div>
      </div>
    </div>
  </div>

  <!-- context menu -->
  <div id="context-menu"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

  <script src="js/filesystem.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/windowManager.js"></script>
  <script src="js/apps/fileExplorer.js"></script>
  <script src="js/apps/codeEditor.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/browser.js"></script>
  <script src="js/apps/musicPlayer.js"></script>
  <script src="js/apps/settings.js"></script>
  <script src="js/desktop.js"></script>
</body>
</html>
